server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/hero_middleware_test?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
      username: root
      password: root
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: admin
        login-password: admin

zhishu:
  api:
    base-url: https://open.qfei.cn
    app-id: your-test-app-id
    app-secret: your-test-app-secret
    timeout: 30000
    draft-page-url: https://test.zhishu.com/contract/draft?id={contractId}

yuecai:
  api:
    base-url: http://test.yuecai-api.com
    app-id: your-test-app-id
    app-secret: your-test-app-secret
    timeout: 30000

feishu:
  api:
    base-url: https://open.feishu.cn
    app-id: your-test-feishu-app-id
    app-secret: your-test-feishu-app-secret
    timeout: 30000
  bitable:
    app-token: your-test-feishu-bitable-app-token
    payment-table-id: your-test-payment-table-id
    receipt-table-id: your-test-receipt-table-id
    archive-table-id: your-test-receipt-table-id
    tax-table-id: your-test-tax-table-id

api-log:
  enabled: false
  api-app-token: ""
  api-table-id: ""
  max-content-length: 20000
  alert:
    enabled: false
    receive-chat-ids: []
    receive-user-ids: []
    dedup-window-seconds: 300
    max-error-summary-length: 500

zhishu-event-log:
  enabled: false
  table-id: ""
  max-content-length: 20000

logging:
  level:
    com.hero.middleware: info
